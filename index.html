<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Software Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f11;
      --bg2: #17171a;
      --bg3: #1e1e22;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #f0eff4;
      --text2: #9d9aaa;
      --text3: #5e5c6a;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --radius: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-brand .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c6af7, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .topbar-brand span {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(124, 106, 247, 0.15);
      color: var(--accent2);
      border: 1px solid rgba(124, 106, 247, 0.25);
      font-weight: 500;
    }

    .manager-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .manager-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(124, 106, 247, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px;
      min-width: 230px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text3);
      padding: 16px 16px 6px;
      text-transform: uppercase;
    }

    .agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 2px;
      transition: all 0.15s;
    }

    .agent-item:hover {
      background: var(--bg2);
    }

    .agent-item.active {
      background: var(--bg3);
      border-color: var(--border2);
    }

    .agent-emoji {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .agent-role {
      font-size: 11px;
      color: var(--text2);
      margin-top: 1px;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(124, 106, 247, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 4px;
      border: 1px solid rgba(124, 106, 247, 0.2);
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text2);
      max-width: 300px;
      line-height: 1.7;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .quick-btn {
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      cursor: pointer;
      color: var(--text2);
      transition: all 0.15s;
    }

    .quick-btn:hover {
      background: var(--bg3);
      color: var(--text);
      border-color: rgba(124, 106, 247, 0.4);
    }

    /* Chat header */
    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .chat-header-emoji {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
    }

    .chat-header h3 {
      font-size: 14px;
      font-weight: 600;
    }

    .chat-header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 1px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 0;
    }

    .empty-state .e-emoji {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg.user .msg-content {
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg2);
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: rgba(124, 106, 247, 0.15);
      border-color: rgba(124, 106, 247, 0.25);
    }

    .msg-time {
      font-size: 11px;
      color: var(--text3);
      padding: 0 2px;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text3);
      animation: pulse 1.2s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* Input area */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: flex-end;
      padding: 8px 14px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within {
      border-color: rgba(124, 106, 247, 0.5);
    }

    .input-wrap textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      line-height: 1.6;
      resize: none;
      min-height: 22px;
      max-height: 120px;
    }

    .input-wrap textarea::placeholder {
      color: var(--text3);
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 16px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: rgba(124, 106, 247, 0.2);
      border-color: rgba(124, 106, 247, 0.4);
      color: var(--accent2);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Scrollbar for sidebar */
    .agent-list::-webkit-scrollbar {
      width: 3px;
    }

    .agent-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .agent-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Code blocks in messages */
    .msg-bubble code {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.06);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .msg-bubble pre {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo">💼</div>
      <span>AI Software Company</span>
    </div>
    <div class="topbar-right">
      <span class="badge">5 agents online</span>
      <div class="manager-chip">
        <div class="manager-avatar">👤</div>
        Manager
      </div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section-label">Your Team</div>
      <div class="agent-list" id="agentList"></div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main">

      <!-- Welcome -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Welcome, Manager</h2>
        <p>Select a team member from the sidebar to start assigning tasks. Each agent is powered by real AI.</p>
        <div class="quick-actions">
          <button class="quick-btn"
            onclick="quickStart('pm', 'Create a 2-week sprint plan for a job search web app')">📋 Sprint Plan</button>
          <button class="quick-btn" onclick="quickStart('frontend', 'Review my React navbar component design')">🎨 UI
            Review</button>
          <button class="quick-btn" onclick="quickStart('backend', 'Design a REST API for user authentication')">⚙️ API
            Design</button>
          <button class="quick-btn" onclick="quickStart('tester', 'Write test cases for a login form')">🧪 Test
            Cases</button>
          <button class="quick-btn" onclick="quickStart('devops', 'Set up a CI/CD pipeline for my project')">🚀 CI/CD
            Setup</button>
        </div>
      </div>

      <!-- Chat View (hidden initially) -->
      <div id="chatView" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="chat-header" id="chatHeader"></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <div class="input-wrap">
            <textarea id="msgInput" placeholder="Assign a task or ask a question..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
            &#9654;
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── AGENT DEFINITIONS ──
    const agents = [
      {
        id: 'pm',
        name: 'Alex',
        role: 'Product Manager',
        emoji: '🧑‍💼',
        bg: 'rgba(124,106,247,0.15)',
        system: `You are Alex, a sharp and experienced Product Manager at an AI software company. The user is your manager. You speak in a professional but friendly tone. You help with sprint planning, product roadmaps, feature prioritization, user stories, OKRs, and project timelines. Keep responses focused and actionable. Use bullet points when listing items. Always end with a clear next-step suggestion. If asked to write a sprint plan, format it clearly with goals, tasks, and timeline.`
      },
      {
        id: 'frontend',
        name: 'Sara',
        role: 'Frontend Engineer',
        emoji: '👩‍💻',
        bg: 'rgba(29,158,117,0.15)',
        system: `You are Sara, a skilled Frontend Engineer specializing in React, Tailwind CSS, and modern UI/UX. The user is your manager. You speak in a helpful, technically clear tone. You help with React component design, CSS styling, performance optimization, accessibility, responsive design, and frontend architecture decisions. When writing code, use modern best practices. Always explain what the code does and why you made those choices. Format code in code blocks.`
      },
      {
        id: 'backend',
        name: 'Omar',
        role: 'Backend Engineer',
        emoji: '🧑‍🔧',
        bg: 'rgba(55,138,221,0.15)',
        system: `You are Omar, a senior Backend Engineer specializing in Node.js, Express, REST APIs, PostgreSQL, and system design. The user is your manager. You speak in a clear, technical but approachable tone. You help with API design, database schema design, authentication systems, performance optimization, and backend architecture. Always justify your technical decisions and mention trade-offs. Format code examples clearly in code blocks.`
      },
      {
        id: 'tester',
        name: 'Priya',
        role: 'QA Engineer',
        emoji: '🧪',
        bg: 'rgba(216,90,48,0.15)',
        system: `You are Priya, a thorough and detail-oriented QA Engineer. The user is your manager. You help with writing test cases, identifying edge cases, reviewing features for potential bugs, suggesting manual and automated testing strategies, and writing test plans. You always think about what could go wrong. Use numbered lists for test cases. Format test cases with: Test ID, Description, Steps, Expected Result, and Priority.`
      },
      {
        id: 'devops',
        name: 'Leo',
        role: 'DevOps Engineer',
        emoji: '⚙️',
        bg: 'rgba(186,117,23,0.15)',
        system: `You are Leo, an experienced DevOps Engineer specializing in CI/CD pipelines, Docker, GitHub Actions, cloud platforms (AWS/GCP), and infrastructure as code. The user is your manager. You speak in a practical, no-nonsense tone. You help with deployment strategies, containerization, environment setup, monitoring, scaling, and security best practices. Always recommend best practices and explain trade-offs clearly. Format commands and configs in code blocks.`
      }
    ];

    // ── STATE ──
    const histories = {};
    agents.forEach(a => histories[a.id] = []);
    let activeAgent = null;
    let isLoading = false;

    // ── RENDER SIDEBAR ──
    function renderSidebar() {
      const list = document.getElementById('agentList');
      list.innerHTML = agents.map(a => `
        <div class="agent-item" id="item-${a.id}" onclick="selectAgent('${a.id}')">
          <div class="agent-emoji" style="background:${a.bg}">${a.emoji}</div>
          <div class="agent-info">
            <div class="agent-name">${a.name}</div>
            <div class="agent-role">${a.role}</div>
          </div>
          <div class="online-dot"></div>
        </div>
      `).join('');
    }

    // ── SELECT AGENT ──
    function selectAgent(id) {
      activeAgent = agents.find(a => a.id === id);
      document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
      document.getElementById('item-' + id).classList.add('active');
      document.getElementById('welcome').style.display = 'none';
      const cv = document.getElementById('chatView');
      cv.style.display = 'flex';
      cv.style.flexDirection = 'column';
      renderHeader();
      renderMessages();
      setTimeout(() => document.getElementById('msgInput').focus(), 50);
    }

    // ── QUICK START ──
    function quickStart(agentId, message) {
      selectAgent(agentId);
      setTimeout(() => doSend(message), 100);
    }

    // ── RENDER HEADER ──
    function renderHeader() {
      document.getElementById('chatHeader').innerHTML = `
        <div class="chat-header-emoji" style="background:${activeAgent.bg}">${activeAgent.emoji}</div>
        <div>
          <h3>${activeAgent.name}</h3>
          <p>${activeAgent.role} &bull; Online now</p>
        </div>
      `;
    }

    // ── RENDER MESSAGES ──
    function renderMessages() {
      const container = document.getElementById('messages');
      const msgs = histories[activeAgent.id];

      if (msgs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="e-emoji">${activeAgent.emoji}</div>
            <p>Hi! I'm <strong>${activeAgent.name}</strong>, your ${activeAgent.role}.<br>What task can I help you with today?</p>
          </div>`;
        return;
      }

      container.innerHTML = msgs.map(m => `
        <div class="msg ${m.role === 'user' ? 'user' : ''}">
          <div class="msg-avatar" style="background:${m.role === 'user' ? 'rgba(124,106,247,0.15)' : activeAgent.bg}">
            ${m.role === 'user' ? '👤' : activeAgent.emoji}
          </div>
          <div class="msg-content">
            <div class="msg-bubble">${formatMessage(m.content)}</div>
            <div class="msg-time">${m.time}</div>
          </div>
        </div>
      `).join('');

      container.scrollTop = container.scrollHeight;
    }

    // ── FORMAT MESSAGE (basic markdown) ──
    function formatMessage(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    // ── TYPING INDICATOR ──
    function showTyping() {
      const container = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'msg';
      el.id = 'typing-row';
      el.innerHTML = `
        <div class="msg-avatar" style="background:${activeAgent.bg}">${activeAgent.emoji}</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-row');
      if (el) el.remove();
    }

    // ── TIME ──
    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ── SEND ──
    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || isLoading) return;
      input.value = '';
      autoResize(input);
      await doSend(text);
    }

    async function doSend(text) {
      if (!activeAgent) return;
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;

      histories[activeAgent.id].push({ role: 'user', content: text, time: now() });
      renderMessages();
      showTyping();

      // Build messages array for API (no time field)
      const apiMessages = histories[activeAgent.id].map(m => ({
        role: m.role === 'user' ? 'user' : 'assistant',
        content: m.content
      }));

      // ⚠️ Replace with your free Groq API key from console.groq.com
      const GROQ_API_KEY = 'ENTER_YOUR_GROQ_KEY_HERE';

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            max_tokens: 1000,
            messages: [
              { role: 'system', content: activeAgent.system },
              ...apiMessages
            ]
          })
        });

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error.message);
        }

        const reply = data.choices?.[0]?.message?.content || 'Sorry, I could not generate a response.';
        removeTyping();
        histories[activeAgent.id].push({ role: 'assistant', content: reply, time: now() });
        renderMessages();

      } catch (err) {
        removeTyping();
        histories[activeAgent.id].push({
          role: 'assistant',
          content: `Sorry, I ran into an error: ${err.message || 'Unknown error'}. Make sure the API key is set up correctly.`,
          time: now()
        });
        renderMessages();
      }

      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      setTimeout(() => document.getElementById('msgInput')?.focus(), 50);
    }

    // ── KEYBOARD ──
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // ── AUTO RESIZE TEXTAREA ──
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── INIT ──
    renderSidebar();
  </script>
</body>

</html>
